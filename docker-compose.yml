services:
  clarityocr:
    build: .
    image: clarityocr:latest
    container_name: clarityocr
    ports:
      - "8008:8008"
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./inputs:/app/inputs
      - ./output_v2:/app/output_v2
      - clarityocr_models:/root/.cache/huggingface
      - clarityocr_data:/root/.clarityocr
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CLARITY_HOST=0.0.0.0
      - CLARITY_PORT=8008
      - DB_PATH=/app/output_v2/clarityocr_v2.sqlite
      # Uploads default to ~/.clarityocr/uploads (clarityocr_data volume).
      # Do NOT point at ./inputs bind-mount — it may have a small partition.
      - V2_LLM_BASE_URL=http://llm_server:8080/v1
      - V2_POLISH_BREAKER_THRESHOLD=3
      - V2_POLISH_BREAKER_COOLDOWN_SEC=120
      # Parallelism: 2 workers, but only 1 GPU-heavy OCR at a time
      - V2_WORKERS=2
      - V2_GPU_CONCURRENCY=1
    depends_on:
      - llm_server
    restart: unless-stopped

  llm_server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: clarityocr_llm
    command: >
      -m /models/qwen3.5-4b-q6_k.gguf
      --host 0.0.0.0
      --port 8080
      -ngl 99
      -c 4096
      --chat-template chatml
    ports:
      - "8000:8080"
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      # Mount GGUF models directory from host
      # Place .gguf files in ./models/ or set LLM_MODELS_DIR
      - ${LLM_MODELS_DIR:-./models}:/models:ro
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    restart: unless-stopped

volumes:
  clarityocr_models:
    name: clarityocr_models
  clarityocr_data:
    name: clarityocr_data
