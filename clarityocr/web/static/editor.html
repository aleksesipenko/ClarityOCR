<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Markdown Editor - ClarityOCR</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
    <style>
      .editor-container {
        height: calc(100vh - 200px);
        margin-top: 20px;
      }
      .EasyMDEContainer {
        height: 100%;
      }
      .editor-toolbar {
        border-top-left-radius: var(--radius-sm);
        border-top-right-radius: var(--radius-sm);
        background: var(--line-light);
      }
      .CodeMirror {
        border-bottom-left-radius: var(--radius-sm);
        border-bottom-right-radius: var(--radius-sm);
        height: 100% !important;
        background: var(--card) !important;
        color: var(--ink) !important;
      }
      .editor-preview {
        background: var(--card) !important;
        color: var(--ink) !important;
      }
      .topbar-actions {
        display: flex;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="title">
          <div class="h1">
            <span class="logo">◉</span>
            Document Editor
          </div>
          <div class="sub" id="editingFileName">Editing...</div>
        </div>
        <div class="topbar-right">
          <div class="topbar-actions">
            <button id="btnSave" class="btn primary">Save Changes</button>
            <button id="btnExport" class="btn">Export...</button>
            <a href="/" class="btn">Close</a>
          </div>
          <button id="btnTheme" class="btn icon" title="Toggle theme">
            <span class="theme-icon"></span>
          </button>
        </div>
      </header>

      <section class="card editor-container">
        <textarea id="markdownEditor"></textarea>
      </section>

      <footer class="footer">
        <span>ClarityOCR Editor</span>
      </footer>
    </div>

    <!-- Export Modal (same as index) -->
    <div class="modal" id="exportModal" hidden>
      <div class="modal-backdrop"></div>
      <div class="modalCard export-modal">
        <div class="modalHead">
          <div class="h2">Export Document</div>
          <div class="row">
            <button id="btnCloseExport" class="btn">Cancel</button>
          </div>
        </div>
        <div class="modalBody">
          <div class="row settings-row">
            <label class="label">Format</label>
            <select id="exportFormat" class="input">
              <option value="docx">Microsoft Word (.docx)</option>
              <option value="html">HTML Web Page (.html)</option>
            </select>
          </div>
          <div class="row settings-row" id="refDocRow">
            <label class="label">Style Doc</label>
            <input id="refDocPath" class="input" type="text" placeholder="Path to reference.docx (optional)" />
          </div>
          <div class="row row-actions">
            <div class="spacer"></div>
            <button id="btnDoExport" class="btn primary">Export Now</button>
          </div>
          <div id="exportStatus" class="postprocess-status hidden"></div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const filePath = urlParams.get('file');
      let easyMDE;

      if (!filePath) {
        alert('No file specified');
        window.location.href = '/';
      }

      document.getElementById('editingFileName').textContent = filePath.split(/[/\\]/).pop();

      // Load file content
      async function loadFile() {
        try {
          // We'll add a helper endpoint to read file content if it doesn't exist
          // Or just use api_browse if it returns content (it doesn't yet)
          const response = await fetch(`/api/v1/file/read?path=${encodeURIComponent(filePath)}`);
          if (!response.ok) throw new Error('Failed to load file');
          const data = await response.json();

          easyMDE = new EasyMDE({
            element: document.getElementById('markdownEditor'),
            initialValue: data.content,
            spellChecker: false,
            autosave: {
              enabled: true,
              uniqueId: "ClarityOCR_" + filePath,
              delay: 10000,
            },
            status: ["autosave", "lines", "words", "cursor"],
          });
        } catch (err) {
          alert(err.message);
        }
      }

      loadFile();

      document.getElementById('btnSave').onclick = async () => {
        const content = easyMDE.value();
        try {
          const response = await fetch('/api/v1/file/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path: filePath, content })
          });
          if (response.ok) {
            alert('Saved successfully');
          } else {
            alert('Failed to save');
          }
        } catch (err) {
          alert(err.message);
        }
      };

      // Theme toggle
      const btnTheme = document.getElementById('btnTheme');
      btnTheme.onclick = () => {
        const current = document.body.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      };

      if (localStorage.getItem('theme') === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
      }

      // Export logic
      const exportModal = document.getElementById('exportModal');
      document.getElementById('btnExport').onclick = () => {
        exportModal.hidden = false;
      };
      document.getElementById('btnCloseExport').onclick = () => {
        exportModal.hidden = true;
      };

      document.getElementById('btnDoExport').onclick = async () => {
          const format = document.getElementById('exportFormat').value;
          const refDoc = document.getElementById('refDocPath').value;
          const statusDiv = document.getElementById('exportStatus');

          statusDiv.textContent = 'Exporting...';
          statusDiv.className = 'postprocess-status';
          statusDiv.classList.remove('hidden');

          try {
              const response = await fetch('/api/v1/export', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                      file: filePath,
                      format: format,
                      reference_doc: refDoc
                  })
              });
              const result = await response.json();
              if (result.ok) {
                  statusDiv.textContent = `Success! Exported to ${result.filename}`;
                  statusDiv.classList.add('success');
              } else {
                  statusDiv.textContent = `Error: ${result.error}`;
                  statusDiv.classList.add('error');
              }
          } catch (err) {
              statusDiv.textContent = `Error: ${err.message}`;
              statusDiv.classList.add('error');
          }
      };
    </script>
  </body>
</html>
